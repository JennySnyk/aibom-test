# =============================================================================
# AIBOM Policy Enforcement Pipeline
# Generates an AI Bill of Materials and enforces model/license policies
# =============================================================================
name: AIBOM Policy Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

jobs:
  aibom-policy:
    name: Generate AIBOM & Enforce Policies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # -----------------------------------------------------------------------
      # Generate AIBOM (JSON)
      # -----------------------------------------------------------------------
      - name: Generate AIBOM (JSON)
        run: |
          snyk aibom --experimental \
            --json-file-output=aibom.json

      # -----------------------------------------------------------------------
      # Generate AIBOM (HTML visualization)
      # -----------------------------------------------------------------------
      - name: Generate AIBOM (HTML)
        run: |
          snyk aibom --experimental --html > aibom.html

      # -----------------------------------------------------------------------
      # Policy 1 – Block models from Hugging Face (expected to FAIL)
      # -----------------------------------------------------------------------
      - name: "Policy: Block Hugging Face models"
        run: |
          echo "=============================================="
          echo "  AIBOM POLICY CHECK: Hugging Face Models"
          echo "=============================================="
          echo ""

          VIOLATIONS=$(cat aibom.json | jq '[.components[] | select(.type == "machine-learning-model") | select(.publisher == "Hugging Face Inc")]')
          COUNT=$(echo "$VIOLATIONS" | jq 'length')

          if [ "$COUNT" -gt 0 ]; then
            echo "::error::PIPELINE BLOCKED: Disallowed AI components detected."
            echo ""
            echo "  $COUNT Hugging Face model(s) found in the AI supply chain."
            echo "  Per organizational policy, models from Hugging Face Inc are"
            echo "  not approved for use in this project."
            echo ""
            echo "  Blocked models:"
            echo "$VIOLATIONS" | jq -r '.[] | "    - \(.name) (v\(.version // "n/a"))"'
            echo ""
            echo "  Action required:"
            echo "    1. Remove or replace the disallowed model(s) listed above."
            echo "    2. Use an approved model provider instead."
            echo "    3. Or request a policy exception from the security team."
            echo ""
            echo "=============================================="
            echo "  RESULT: FAILED — Pipeline blocked"
            echo "=============================================="
            exit 1
          else
            echo "  No Hugging Face models detected. Policy check passed."
            echo ""
            echo "=============================================="
            echo "  RESULT: PASSED"
            echo "=============================================="
          fi

      # -----------------------------------------------------------------------
      # Policy 2 – Block strong copyleft licenses (expected to PASS)
      # -----------------------------------------------------------------------
      - name: "Policy: Block strong copyleft licenses (GPL/OSL)"
        run: |
          echo "=============================================="
          echo "  AIBOM POLICY CHECK: Copyleft Licenses"
          echo "=============================================="
          echo ""

          VIOLATIONS=$(cat aibom.json | jq '[.components[] | select(.type == "machine-learning-model") | select(any(.licenses[]?.license?.id; type == "string" and test("^GPL|OSL")))]')
          COUNT=$(echo "$VIOLATIONS" | jq 'length')

          if [ "$COUNT" -gt 0 ]; then
            echo "::error::PIPELINE BLOCKED: Disallowed AI components detected."
            echo ""
            echo "  $COUNT model(s) with strong copyleft licenses (GPL/OSL) found."
            echo "  Per organizational policy, models under GPL or OSL licenses"
            echo "  are not approved for use in this project."
            echo ""
            echo "  Blocked models:"
            echo "$VIOLATIONS" | jq -r '.[] | "    - \(.name) — license: \(.licenses[0]?.license?.id // "unknown")"'
            echo ""
            echo "  Action required:"
            echo "    1. Remove or replace the disallowed model(s) listed above."
            echo "    2. Use a model with a permissive license (MIT, Apache-2.0, etc.)."
            echo "    3. Or request a policy exception from the legal team."
            echo ""
            echo "=============================================="
            echo "  RESULT: FAILED — Pipeline blocked"
            echo "=============================================="
            exit 1
          else
            echo "  No models with copyleft licenses detected. Policy check passed."
            echo ""
            echo "=============================================="
            echo "  RESULT: PASSED"
            echo "=============================================="
          fi

      # -----------------------------------------------------------------------
      # Upload AIBOM artifacts (always runs, even if policies fail)
      # -----------------------------------------------------------------------
      - name: Upload AIBOM JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aibom-json
          path: aibom.json
          retention-days: 90

      - name: Upload AIBOM HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aibom-html
          path: aibom.html
          retention-days: 90
